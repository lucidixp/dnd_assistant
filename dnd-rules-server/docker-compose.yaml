services:

  dnd-rules-api:
    container_name: dnd-rules-api

    build: ./rules-api

    ports:
      - "${RULES_API_PORT}:8000"

    environment:
      VAULT_PATH: /vault
      OLLAMA_URL: ${OLLAMA_URL}
      MODEL: ${MODEL}
      MAX_RESULTS: ${MAX_RESULTS}
      MAX_CONTEXT_CHARS: ${MAX_CONTEXT_CHARS}

    volumes:
      - "${VAULT_PATH}:/vault"

    restart: unless-stopped
